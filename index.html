        const { useState } = React;

        function App() {

                    </section>

                        {categories.map(category => (

                                <h3 className="category-title text-zh">
                                    {lang === 'en' ? category.name_en : category.name_zh}
                                </h3>
                                <div className="menu-grid">
                                    {category.items.map((item, idx) => (
                                        <div key={idx} className="menu-item">
                                            <div className="item-info">
                                                <p className="item-name-zh" style={{ display: lang === 'en' ? 'none' : 'block' }}>{item.name_zh}</p>
                                                <p className="item-name-en" style={{
                                                    fontSize: '1.2rem',
                                                    fontWeight: 700,
                                                    color: '#2C3E50',
                                                    marginBottom: '0.4rem',
                                                    display: lang === 'zh' ? 'none' : 'block'
                                                }}>{item.name_en}</p>
                                                
                                                <p className="item-name-en" style={{
                                                    display: lang === 'en' ? 'none' : 'block'
                                                }}>{item.name_en}</p>
                                                <p className="item-name-zh" style={{

                                                    display: lang === 'zh' ? 'none' : 'block'
                                                }}>{item.name_zh}</p>
